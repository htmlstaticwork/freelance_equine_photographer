<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — EQUIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22serif%22 fill=%22%23c9a84c%22>E</text></svg>">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="auth-page">

    <div class="auth-toggles">
        <button class="toggle-btn dir-toggle" title="Toggle RTL">
            <i data-lucide="align-right"></i>
        </button>
        <button class="toggle-btn theme-toggle" title="Toggle Theme">
            <i data-lucide="sun"></i>
        </button>
    </div>

    <div class="auth-card">
        <a href="index.html" class="logo">EQUIS</a>
        <span class="tagline">Create your account</span>
        
        <form class="auth-form">
            <div class="form-group">
                <input type="text" class="contact-form" placeholder="First Name" required>
            </div>
            <div class="form-group">
                <input type="text" class="contact-form" placeholder="Last Name" required>
            </div>
            <div class="form-group">
                <input type="email" class="contact-form" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" class="contact-form" id="reg-pass" placeholder="Password" required>
                <i data-lucide="eye" class="password-toggle" onclick="togglePassword('reg-pass', this)"></i>
            </div>
            <div class="form-group">
                <input type="password" class="contact-form" id="confirm-pass" placeholder="Confirm Password" required>
                <i data-lucide="eye" class="password-toggle" onclick="togglePassword('confirm-pass', this)"></i>
            </div>
            
            <div class="mb-4">
                <label class="terms-label">
                    <input type="checkbox" required> I agree to the <a href="#" class="text-gold">Terms & Privacy Policy</a>
                </label>
            </div>
            
            <button type="submit" class="btn-equis btn-gold w-100">Create Account</button>
        </form>

        <div class="auth-divider"></div>

        <div class="social-auth">
            <button class="btn-social">
                <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z" fill="#4285f4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34a853"/><path d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957a8.995 8.995 0 0 0 0 8.088l3.007-2.332z" fill="#fbbc05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.956l3.007 2.332C4.672 5.164 6.656 3.58 9 3.58z" fill="#ea4335"/></svg>
                Sign up with Google
            </button>
            <button class="btn-social">
                <i data-lucide="apple"></i>
                Sign up with Apple
            </button>
            <button class="btn-social">
                <i data-lucide="facebook" class="icon-facebook"></i>
                Sign up with Facebook
            </button>
        </div>

        <div class="auth-footer">
            Already have an account? <a href="login.html">Sign In</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                el.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                el.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>
</html>
