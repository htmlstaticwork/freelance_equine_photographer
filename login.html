<!DOCTYPE html>
<html lang="en" data-theme="dark" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — EQUIS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22 font-family=%22serif%22 fill=%22%23c9a84c%22>E</text></svg>">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="auth-page">

    <div class="auth-toggles">
        <button class="toggle-btn dir-toggle" title="Toggle RTL">
            <i data-lucide="align-right"></i>
        </button>
        <button class="toggle-btn theme-toggle" title="Toggle Theme">
            <i data-lucide="sun"></i>
        </button>
    </div>

    <div class="auth-card">
        <a href="index.html" class="brand-logo">
            <div class="logo-icon">E</div>
            <span class="logo-text">EQUIS</span>
        </a>
        <span class="tagline">Welcome back</span>

        <form class="auth-form">
            <div class="form-group">
                <input type="email" class="contact-form" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" class="contact-form" id="login-pass" placeholder="Password" required>
                <i data-lucide="eye" class="password-toggle" onclick="togglePassword('login-pass', this)"></i>
            </div>

            <div class="auth-meta">
                <label>
                    <input type="checkbox"> <span>Remember Me</span>
                </label>
                <a href="#" class="text-gold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn-equis btn-gold w-100">Sign In</button>
        </form>

        <div class="auth-divider"></div>

        <div class="social-auth">
            <button class="btn-social" title="Continue with Google">
                <svg width="20" height="20" viewBox="0 0 18 18">
                    <path
                        d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.874 2.684-6.615z"
                        fill="#4285f4" />
                    <path
                        d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"
                        fill="#34a853" />
                    <path
                        d="M3.964 10.712c-.18-.54-.282-1.117-.282-1.712s.102-1.173.282-1.712V4.956H.957a8.995 8.995 0 0 0 0 8.088l3.007-2.332z"
                        fill="#fbbc05" />
                    <path
                        d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.956l3.007 2.332C4.672 5.164 6.656 3.58 9 3.58z"
                        fill="#ea4335" />
                </svg>
            </button>
            <button class="btn-social" title="Continue with Apple">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-apple icon-monochrome">
                    <path
                        d="M12 20.94c1.88 0 3.05-.76 3.05-.76s-1.89-1.92-1.89-4.32c0-2.4 2.16-4.5 2.16-4.5s-1.57-1.12-3.15-1.12c-1.58 0-2.88 1.1-2.88 1.1s-1.3-1.1-2.88-1.1c-1.58 0-3.15 1.12-3.15 1.12s2.16 2.1 2.16 4.5c0 2.4-1.89 4.32-1.89 4.32s1.17.76 3.05.76c1.88 0 2.82-1.1 2.82-1.1s.94 1.1 2.82 1.1zM12 6c1.4 0 2.5-1.1 2.5-2.5S13.4 1 12 1s-2.5 1.1-2.5 2.5S10.6 6 12 6z" />
                </svg>
            </button>
            <button class="btn-social" title="Continue with Facebook">
                <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="lucide lucide-facebook icon-monochrome">
                    <path d="M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z" />
                </svg>
            </button>
        </div>

        <div class="auth-footer">
            <span>Don't have an account?</span> <a href="register.html">Sign Up</a>
        </div>
    </div>

    <script src="js/main.js"></script>
    <script>
        function togglePassword(id, el) {
            const input = document.getElementById(id);
            if (input.type === 'password') {
                input.type = 'text';
                el.setAttribute('data-lucide', 'eye-off');
            } else {
                input.type = 'password';
                el.setAttribute('data-lucide', 'eye');
            }
            lucide.createIcons();
        }
    </script>
</body>

</html>
